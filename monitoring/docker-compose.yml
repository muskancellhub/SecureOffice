version: '3.8'

# =============================================================================
#  Zabbix + Grafana monitoring stack for SecureOffice
#
#  Usage:
#    cd monitoring
#    docker compose up -d
#
#  Endpoints:
#    Zabbix UI  → http://localhost:8080   (Admin / zabbix)
#    Grafana    → http://localhost:3000   (admin / admin)
#    Zabbix API → http://localhost:8080/api_jsonrpc.php
# =============================================================================

networks:
  zbxnet:
    driver: bridge

services:
  # ── PostgreSQL for Zabbix ──────────────────────────────────────────
  zabbix-postgres:
    image: postgres:16-alpine
    container_name: zabbix-postgres
    networks: [zbxnet]
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pass
    volumes:
      - zabbix_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Zabbix Server ──────────────────────────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:7.0-alpine-latest
    container_name: zabbix-server
    networks: [zbxnet]
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pass
      ZBX_STARTPOLLERS: 5
      ZBX_STARTPINGERS: 2
    depends_on:
      - zabbix-postgres
    ports:
      - "10051:10051"
    restart: unless-stopped

  # ── Zabbix Web Frontend (nginx) ────────────────────────────────────
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:7.0-alpine-latest
    container_name: zabbix-web
    networks: [zbxnet]
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pass
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/New_York
    depends_on:
      - zabbix-server
      - zabbix-postgres
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Zabbix Agent (monitors the host itself) ────────────────────────
  zabbix-agent:
    image: zabbix/zabbix-agent2:7.0-alpine-latest
    container_name: zabbix-agent
    networks: [zbxnet]
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_HOSTNAME: "Zabbix server"
    depends_on:
      - zabbix-server
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:10.2.6
    container_name: grafana
    networks: [zbxnet]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Allow embedding in iframes
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "disabled"
      GF_SECURITY_COOKIE_SECURE: "false"
      # Anonymous access so iframes load without login
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Remove X-Frame-Options header
      GF_SECURITY_X_FRAME_OPTIONS: ""
      GF_SERVER_ROOT_URL: http://localhost:3000
      # Install Zabbix plugin
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app 4.4.5
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      zabbix-web:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  zabbix_pg_data:
  grafana_data:
